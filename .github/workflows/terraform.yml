name: Terraform Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Test create-only plan audit
        shell: pwsh
        run: ./infra/terraform/tests/Assert-FrontendPlan.Tests.ps1
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.5
      - run: terraform fmt -check -recursive infra/terraform
      - run: terraform -chdir=infra/terraform init -backend=false -input=false -lockfile=readonly
      - run: terraform -chdir=infra/terraform validate
